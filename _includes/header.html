<header class="site-header">
  <div class="wrap site-header__inner">
    <a href="{{ '/' | relative_url }}" class="brand">
      <span class="brand__mark">H</span>
      <span class="brand__text">
        <span class="brand__name">Haxtun Bulldogs</span>
        <span class="brand__sub">9-12 Softball • {{ site.season }}</span>
      </span>
    </a>

    <button class="nav-toggle" aria-label="Toggle menu" aria-expanded="false" aria-controls="primary-nav">
      <span></span><span></span><span></span>
    </button>

    <nav id="primary-nav" class="site-nav">
      {% for item in site.nav %}
        <a href="{{ item.url | relative_url }}"
           class="site-nav__link {% if page.url == item.url %}is-active{% endif %}">{{ item.title }}</a>
      {% endfor %}
    </nav>
  </div>
</header>
<script>
  (function(){
    var t = document.querySelector('.nav-toggle');
    var n = document.getElementById('primary-nav');
    if(!t||!n) return;
    t.addEventListener('click', function(){
      var open = n.classList.toggle('is-open');
      t.classList.toggle('is-open', open);
      t.setAttribute('aria-expanded', open);
    });
  })();
</script>
