# Site
title: Haxtun Bulldogs Softball
tagline: 9-12 Girls • 2026 Season
description: Schedule, rules, roster, and updates for the Haxtun Bulldogs 9-12 girls softball team.
url: "https://mcconnellentllc-cloud.github.io"
baseurl: "/haxtun-softball9-12"
season: "2026"

# Coaches portal (separate Next.js app deployed on Vercel). When set, the
# red "H" logo becomes a hidden link to it; blank makes the H link home.
coaches_portal_url: "https://haxtun-softball9-12.vercel.app"

# Coaches
head_coach: "Emily Anderson"
assistant_coaches:
  - "Jordan Hagemeyer"
  - "Kyle McConnell"

# League
league_name: "Northeast Colorado Girls Softball League"
league_president: "Victoria Dunker"
home_field: "Haxtun Baseball Field, Haxtun, CO"

# Build
markdown: kramdown
permalink: /:title/
plugins:
  - jekyll-feed
  - jekyll-seo-tag

# Navigation order
nav:
  - { title: "Home",        url: "/" }
  - { title: "Schedule",    url: "/schedule/" }
  - { title: "Roster",      url: "/roster/" }
  - { title: "League Rules", url: "/league-rules/" }
  - { title: "NFHS Rules",  url: "/nfhs-rules/" }
  - { title: "Practices",   url: "/practices/" }
  - { title: "Standings",   url: "/standings/" }
  - { title: "Stats",       url: "/stats/" }
  - { title: "News",        url: "/news/" }
  - { title: "Gallery",     url: "/gallery/" }

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor
  - build_ics.py
  - coaches-portal
