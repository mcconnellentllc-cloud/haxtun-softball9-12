url: "https://mcconnellentllc-cloud.github.io"
baseurl: "/haxtun-softball9-12"
season: "2026"

# Coaches
head_coach: "Emily Anderson"
assistant_coaches:
  - "Jordan Hagemeyer"
  - "Kyle McConnell"

# Contact - TODO: replace with real email and Formspree endpoint
contact_email: "REPLACE_ME@example.com"
